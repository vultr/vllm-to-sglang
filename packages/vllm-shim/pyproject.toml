[project]
name = "vllm-shim"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.110",
    "httpx>=0.27",
    "huggingface_hub>=0.24",
    "uvicorn>=0.30",
]

[project.scripts]
vllm = "vllm_shim.cli.entrypoint:main"
vllm-shim-middleware = "vllm_shim.middleware.app:run"
vllm-shim-info = "vllm_shim.cli.info:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vllm_shim"]
